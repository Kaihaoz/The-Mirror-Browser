<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>The Mirror Browser - 算法透明度体系</title>
    <style>
        /* 微解释提示样式 */
        #micro-explanation {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            display: none;
            z-index: 9999;
        }
        /* 实时画像侧边栏 */
        #real-time-profile {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 260px;
            border: 1px solid #eee;
            padding: 16px;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        /* 数据仪表盘 */
        #analysis-dashboard {
            margin: 20px auto;
            padding: 24px;
            max-width: 1200px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .chart-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .chart-item {
            flex: 1;
            min-width: 400px;
        }
    </style>
    <!-- 引入Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- 第一层：微解释提示 -->
    <div id="micro-explanation"></div>

    <!-- 第二层：实时画像侧边栏 -->
    <div id="real-time-profile">
        <h4>你的实时行为画像</h4>
        <p>加载中...</p>
    </div>

    <!-- 第三层：分析仪表盘 -->
    <div id="analysis-dashboard">
        <h3>算法透明度 - 行为数据仪表盘</h3>
        <div class="chart-group">
            <div class="chart-item">
                <h4>点击热力分布</h4>
                <canvas id="clickHeatmap"></canvas>
            </div>
            <div class="chart-item">
                <h4>元素兴趣雷达图</h4>
                <canvas id="interestRadar"></canvas>
            </div>
        </div>
    </div>

    <!-- 引入核心代码 -->
    <script src="behavior_tracking.js"></script>
    <script src="visualization_chart.js"></script>
</body>
</html>
